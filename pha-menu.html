<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: transparent;
    }

    details {
      width: 100%;
      border: 1px solid #c9ced6;
      border-radius: 6px;
      background: #ffffff;
      overflow: hidden;
    }

    summary {
      position: relative;
      padding: 14px 42px 14px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #f5f6f7;
      list-style: none;
      user-select: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: "▼";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      transition: transform 0.2s ease;
    }

    details[open] summary::after {
      transform: translateY(-50%) rotate(180deg);
    }

    summary:hover {
      background: #eceff2;
    }

    .menu-content {
      padding: 12px;
      border-top: 1px solid #c9ced6;
    }

    .menu-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .pdf-frame {
      display: block;
      width: 100%;
      height: 850px;
      border: none;
    }
  </style>
</head>

<body>

  <details>
    <summary>View PHA Course Menu / 健診コースメニューを見る</summary>

    <div class="menu-content">

      <!-- Use this if your course menu is an image -->
      <img
        class="menu-image"
        src="pha-course-menu.png"
        alt="PHA Course Menu"
      >

    </div>
  </details>

</body>
</html>
